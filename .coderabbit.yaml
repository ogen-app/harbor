# yaml-language-server: $schema=https://www.coderabbit.ai/integrations/schema.v2.json
#
# CodeRabbit configuration for ogen-app/harbor.
# Reference: https://docs.coderabbit.ai/reference/configuration
#
# Harbor ships as a single Go binary (Fiber + bun/Postgres) that embeds a
# Next.js static export (App Router, output: export — no runtime SSR).

language: en-US
tone_instructions: "Be concise and technical. Prioritise correctness, security, and simplicity over style nits."
early_access: false

reviews:
  profile: chill # 'assertive' is noisier; 'chill' suits a small team
  request_changes_workflow: false
  high_level_summary: true
  review_status: true
  collapse_walkthrough: true
  sequence_diagrams: true
  assess_linked_issues: true
  related_prs: true
  poem: false

  auto_review:
    enabled: true
    drafts: false # don't review draft PRs until they're marked ready
    base_branches:
      - main

  # Skip generated / vendored / build-output paths — reviewing them is noise.
  path_filters:
    - "!src/ui/dist/**" # embedded Next.js export, regenerated by `make ui`
    - "!ui/out/**" # Next.js static export output
    - "!ui/.next/**" # Next.js build cache
    - "!ui/package-lock.json"
    - "!**/*.min.js"
    - "!**/*.gen.go" # generated Go (e.g. swagger docs)

  path_instructions:
    - path: "src/**/*.go"
      instructions: >-
        Go backend on Fiber + bun/Postgres. The external Ogen control-plane and
        analytics (Timescale) pools are fail-open: a nil or unreachable pool must
        return a soft JSON state like {"available": false, ...}, never a 500 or a
        panic. Register API routes with a ":param" segment AFTER their static
        sibling routes so Fiber does not shadow them (e.g. /api/tenants/overview
        before /api/tenants/:id). Use errors.Is for sentinel errors such as
        sql.ErrNoRows. Flag SQL assembled by concatenating request input; bound
        parameters (bun's ? placeholders) are expected.
    - path: "ui/src/**/*.{ts,tsx}"
      instructions: >-
        Next.js App Router shipped as a STATIC export embedded in the Go binary —
        there is no server at runtime. Do not introduce server-only features
        (server actions, route handlers, server-side dynamic rendering, or
        server-read env). Data fetching is client-side against /api/*. Auth is
        enforced by the API (session cookie); the client AuthGuard is UX only, so
        never treat a client-side check as a security boundary.
    - path: "ui/src/app/**"
      instructions: >-
        Route files for the static export. A dynamic segment (e.g. [id]) needs
        generateStaticParams and is served as a single client shell that reads
        the real id from the URL at runtime; any new dynamic route also needs a
        matching fallback in the Go static file server so it serves that shell
        for arbitrary ids.
    - path: "**/*.sql"
      instructions: >-
        Harbor owns its own Postgres schema but only READS the external Ogen
        databases — flag any write (INSERT/UPDATE/DELETE/DDL) against Ogen-owned
        tables.

chat:
  auto_reply: true

knowledge_base:
  learnings:
    scope: auto
  pull_requests:
    scope: auto
